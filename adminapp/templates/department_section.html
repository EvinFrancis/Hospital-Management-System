{% extends "index.html" %} {% block content %}

<!doctype html>
<html>
  <head>
    <title>Add Department</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f4f6f9;
      }

      .card {
        margin-top: 6px;
        border-radius: 10px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
      }

      .card-header {
        background: #0d6efd;
        color: white;
        font-size: 22px;
        font-weight: bold;
        text-align: center;
      }

      .btn-primary {
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header">Add Department</div>
                            <h1 class="text-center">Add Department</h1>


            <div class="card-body">
              <form
                method="POST"
                enctype="multipart/form-data"
                action="{% url 'save_department' %}"
              >
                {% csrf_token %}

                <div class="mb-3">
                  <label class="form-label">Department Name</label>
                  <input
                    type="text"
                    class="form-control"
                    name="dpt_name"
                    placeholder="Enter Department Name"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Description</label>
                  <textarea
                    class="form-control"
                    name="dpt_des"
                    rows="3"
                    placeholder="Enter Department Description"
                  ></textarea>
                </div>

                <div class="mb-3">
                  <label class="form-label">Phone</label>
                  <input
                    type="text"
                    class="form-control"
                    name="dpt_phone"
                    placeholder="Enter Phone Number"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input
                    type="email"
                    class="form-control"
                    name="dpt_email"
                    placeholder="Enter Email"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Department Image</label>
                  <input type="file" class="form-control" name="dpt_image" />
                </div>

                <button type="submit" class="btn btn-primary">
                  Save Department
                </button>
                <a  class="btn btn-primary" style="margin-top: 10px;" >
                  View Department                </a>

                  
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
{% endblock content %}
